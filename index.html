<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QQ音乐 - 听我想听</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/player.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='20' font-size='20'>🎵</text></svg>">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">🎵</div>
        <span class="logo-text">QQ音乐</span>
      </div>

      <nav class="nav-menu">
        <div class="nav-section">推荐</div>
        <a href="#" class="nav-item active" data-page="discover">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
          <span>发现音乐</span>
        </a>
        <a href="#" class="nav-item" data-page="podcast">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          <span>播客</span>
        </a>
        <a href="#" class="nav-item" data-page="video">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          <span>视频</span>
        </a>

        <div class="nav-section">我的音乐</div>
        <a href="#" class="nav-item" data-page="liked">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span>我喜欢</span>
          <span class="badge">128</span>
        </a>
        <a href="#" class="nav-item" data-page="history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>最近播放</span>
        </a>
        <a href="#" class="nav-item" data-page="download">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>本地/下载</span>
          <span class="badge">36</span>
        </a>

        <div class="nav-section">创建的歌单</div>
        <a href="#" class="nav-item playlist-item">
          <div class="playlist-cover">📀</div>
          <span>我的最爱</span>
        </a>
        <a href="#" class="nav-item playlist-item">
          <div class="playlist-cover">🎸</div>
          <span>学习专注</span>
        </a>
        <a href="#" class="nav-item playlist-item">
          <div class="playlist-cover">🌙</div>
          <span>深夜电台</span>
        </a>
        <a href="#" class="nav-item playlist-item">
          <div class="playlist-cover">🏃</div>
          <span>运动节奏</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <div class="top-bar-left">
          <button class="nav-btn" id="prevBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="nav-btn" id="nextBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>

        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="搜索音乐、歌手、歌单">
        </div>

        <div class="top-bar-right">
          <button class="icon-btn" title="消息">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </button>
          <button class="icon-btn" title="设置">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <div class="user-avatar">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=MusicLover" alt="用户头像">
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <div class="page-content">
        <!-- Discover Page -->
        <section class="page discover-page active" id="discoverPage">
          <!-- Banner Carousel -->
          <div class="banner-carousel">
            <div class="banner-track" id="bannerTrack">
              <div class="banner-slide" style="background: linear-gradient(135deg, #003529 0%, #006B4F 100%);">
                <div class="banner-content">
                  <span class="banner-tag">精选推荐</span>
                  <h2>华语流行热歌榜</h2>
                  <p>2024年度最受欢迎的华语歌曲合集</p>
                  <button class="play-btn">立即收听</button>
                </div>
                <div class="banner-visual">🎤</div>
              </div>
              <div class="banner-slide" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);">
                <div class="banner-content">
                  <span class="banner-tag">新歌速递</span>
                  <h2>欧美新单推荐</h2>
                  <p>Billboard 榜单热门单曲精选</p>
                  <button class="play-btn">立即收听</button>
                </div>
                <div class="banner-visual">🎸</div>
              </div>
              <div class="banner-slide" style="background: linear-gradient(135deg, #2d1b4e 0%, #4a1942 100%);">
                <div class="banner-content">
                  <span class="banner-tag">日系精选</span>
                  <h2>日系动漫原声精选</h2>
                  <p>经典动漫主题曲合集</p>
                  <button class="play-btn">立即收听</button>
                </div>
                <div class="banner-visual">🌸</div>
              </div>
            </div>
            <div class="banner-dots">
              <span class="dot active" data-index="0"></span>
              <span class="dot" data-index="1"></span>
              <span class="dot" data-index="2"></span>
            </div>
          </div>

          <!-- Quick Entry -->
          <div class="quick-entry">
            <div class="entry-item">
              <div class="entry-icon" style="background: linear-gradient(135deg, #ff6b6b, #ee5a5a);">📅</div>
              <span>每日推荐</span>
            </div>
            <div class="entry-item">
              <div class="entry-icon" style="background: linear-gradient(135deg, #4ecdc4, #44a08d);">📻</div>
              <span>私人FM</span>
            </div>
            <div class="entry-item">
              <div class="entry-icon" style="background: linear-gradient(135deg, #a8e063, #56ab2f);">📊</div>
              <span>排行榜</span>
            </div>
            <div class="entry-item">
              <div class="entry-icon" style="background: linear-gradient(135deg, #667eea, #764ba2);">📁</div>
              <span>歌单分类</span>
            </div>
            <div class="entry-item">
              <div class="entry-icon" style="background: linear-gradient(135deg, #f093fb, #f5576c);">🎙️</div>
              <span>歌手</span>
            </div>
            <div class="entry-item">
              <div class="entry-icon" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">🎵</div>
              <span>新歌速递</span>
            </div>
          </div>

          <!-- Recommended Playlists -->
          <section class="section">
            <div class="section-header">
              <h2>推荐歌单</h2>
              <a href="#" class="more-link">更多 ›</a>
            </div>
            <div class="playlist-grid" id="recommendedPlaylists"></div>
          </section>

          <!-- New Songs -->
          <section class="section">
            <div class="section-header">
              <h2>新歌推荐</h2>
              <a href="#" class="more-link">更多 ›</a>
            </div>
            <div class="song-list" id="newSongsList"></div>
          </section>

          <!-- Hot Artists -->
          <section class="section">
            <div class="section-header">
              <h2>热门歌手</h2>
              <a href="#" class="more-link">更多 ›</a>
            </div>
            <div class="artist-grid" id="artistGrid"></div>
          </section>
        </section>
      </div>
    </main>
  </div>

  <!-- Bottom Player -->
  <footer class="player-bar" id="playerBar">
    <div class="player-left">
      <div class="player-cover" id="playerCover">
        <img src="https://picsum.photos/seed/song1/200" alt="专辑封面" id="playerCoverImg">
        <div class="play-overlay">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
      <div class="player-info">
        <div class="song-title" id="playerTitle">夜曲</div>
        <div class="song-artist" id="playerArtist">周杰伦</div>
      </div>
      <button class="like-btn" id="likeBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>

    <div class="player-center">
      <div class="player-controls">
        <button class="control-btn" id="modeBtn" title="播放模式">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
        <button class="control-btn" id="prevSongBtn" title="上一首">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
        </button>
        <button class="control-btn play-main" id="playPauseBtn" title="播放/暂停">
          <svg viewBox="0 0 24 24" fill="currentColor" id="playIcon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor" id="pauseIcon" style="display:none;"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button class="control-btn" id="nextSongBtn" title="下一首">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        </button>
        <button class="control-btn" id="lyricsBtn" title="歌词">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16M12 4v16M20 4v16"/></svg>
        </button>
      </div>
      <div class="progress-bar">
        <span class="time current-time" id="currentTime">0:00</span>
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <span class="time total-time" id="totalTime">3:45</span>
      </div>
    </div>

    <div class="player-right">
      <button class="control-btn" title="收藏到歌单">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="control-btn" title="分享">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
      <div class="volume-control">
        <button class="control-btn" id="volumeBtn" title="音量">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        </button>
        <div class="volume-slider" id="volumeSlider">
          <div class="volume-fill" id="volumeFill"></div>
          <div class="volume-thumb" id="volumeThumb"></div>
        </div>
      </div>
      <button class="control-btn" title="播放列表">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
    </div>
  </footer>

  <!-- Playlist Panel -->
  <div class="playlist-panel" id="playlistPanel">
    <div class="playlist-panel-header">
      <span>播放列表</span>
      <button class="close-btn" id="closePlaylist">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="playlist-panel-body" id="playlistPanelBody"></div>
  </div>

  <audio id="audioPlayer"></audio>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/player.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
